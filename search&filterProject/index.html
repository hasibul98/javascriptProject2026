<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <header>
        <h1>javaScript Animatin Project</h1>
        <p>150+ Creative CSS & JavaScript Animation Effects</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="search projects...">
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="All">All</button>
            <button class="filter-btn" data-filter="Text Effects">Text Effects</button>
            <button class="filter-btn" data-filter="Scroll Effects">Scroll Effects</button>
            <button class="filter-btn" data-filter="Navigation">Navigation</button>
            <button class="filter-btn" data-filter="Interactive">Interactive</button>
            <button class="filter-btn" data-filter="Visual Effects">Visual Effects</button>
        
        </div>
    </header>
    <div class="projects-container" id="projectList"></div>
</body>
</html>
