<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Animation</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    
    <div class="hero">
        <!-- Pulse Circle -->
         <div class="pulse-circle"></div>

         <!-- phone Frame -->
          <div class="mobile-frame">
            <div class="notch"></div>

            <div class="screen">
                <div class="header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="url">// hasibul.dev</span>

                </div>

                <pre id="code"></pre>

            </div>

          </div>

          <!-- Floating Tags -->
           <div class="tag flutter">Flutter</div>
           <div class="tag react">React Native</div>
           <div class="tag ts">Type Script</div>
           <div class="tag dart">Dart</div>

    </div>
</body>
</html>
